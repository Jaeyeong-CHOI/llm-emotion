name: Continuous Research Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run full cycle
        run: |
          python3 scripts/research_cycle.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add refs/openalex_results.jsonl docs/evidence-table.md data/raw/mock_generations.jsonl results/mock_metrics.json ops/research_state.json
          git diff --cached --quiet || git commit -m "chore: automated daily research cycle"
          git push
